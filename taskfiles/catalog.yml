version: "3"

silent: true

tasks:
  setup:
    desc: Set up demo catalog with s3 bucket, catalog, principal, and roles
    summary: |
      Creates RustFS bucket, Polaris catalog, principal, roles, and loads demo data.
      
      Variables:
        TAGS    Comma-separated Ansible tags (default: all)
      
      Example:
        plforge catalog:setup
        plforge catalog:setup TAGS=bucket,catalog
    cmds:
      - "{{.PLF}} catalog setup {{if .TAGS}}--tags={{.TAGS}}{{end}}"

  verify:sql:
    desc: Verify Polaris catalog using hybrid PyIceberg + DuckDB approach
    summary: |
      Phase 1: Load data via PyIceberg (proper Iceberg metadata handling).
      Phase 2: Verify with DuckDB read-only analysis (no INSERT/UPDATE).
      
      Example:
        plforge catalog:verify:sql
    cmds:
      - "{{.PLF}} catalog verify-sql {{.CLI_ARGS}}"

  explore:sql:
    desc: Explore Polaris catalog with DuckDB CLI in interactive mode
    summary: |
      Opens an interactive DuckDB session pre-loaded with catalog connection settings.
      Requires DuckDB CLI and a completed catalog:setup.
      
      Example:
        plforge catalog:explore:sql
    cmds:
      - |
        if [ -f {{.PROJECT_HOME}}/scripts/explore_catalog.sql ]; then
          duckdb -init {{.PROJECT_HOME}}/scripts/explore_catalog.sql
        else
          echo "SQL script not found. Run 'plforge catalog:setup' first to generate it."
          exit 1
        fi
    preconditions:
      - sh: command -v duckdb
        msg: "DuckDB CLI not found. Install from https://duckdb.org/docs/installation/"

  query:
    desc: Execute read-only SQL query against catalog (no data insertion)
    summary: |
      Runs a SQL query via DuckDB against the Polaris catalog (read-only).
      
      Variables:
        SQL       The SQL query to execute (required)
        OUTPUT    Output format: text (default), markdown, table
      
      Example:
        plforge catalog:query SQL="SELECT COUNT(*) FROM polaris_catalog.wildlife.penguins"
        plforge catalog:query SQL="SHOW ALL TABLES" OUTPUT=markdown
    vars:
      OUTPUT: '{{.OUTPUT | default "text"}}'
    cmds:
      - '{{.PLF}} catalog query --sql "{{.SQL}}" --output {{.OUTPUT}}'
    requires:
      vars: [SQL]
    preconditions:
      - sh: command -v duckdb
        msg: "DuckDB CLI not found. Install from https://duckdb.org/docs/installation/"
      - sh: test -f {{.PROJECT_HOME}}/work/principal.txt
        msg: "Credentials file not found. Run 'plforge catalog:setup' first."

  info:
    desc: Show catalog overview - tables, Iceberg metadata, and record counts
    summary: |
      Comprehensive catalog overview via DuckDB. Shows all tables then
      Iceberg file metadata (manifest paths, data file paths, record counts).

      Variables:
        TABLE     Fully qualified table (default: wildlife.penguins)
        OUTPUT    Output format: text (default), markdown, table

      Example:
        plforge catalog:info
        plforge catalog:info TABLE=wildlife.penguins
        plforge catalog:info OUTPUT=markdown
    vars:
      TABLE: '{{.TABLE | default "wildlife.penguins"}}'
      OUTPUT: '{{.OUTPUT | default "text"}}'
    cmds:
      - 'echo "=== Catalog Tables ==="'
      - '{{.PLF}} catalog query --sql "SHOW ALL TABLES" --output {{.OUTPUT}}'
      - 'echo ""'
      - 'echo "=== Iceberg Metadata: {{.TABLE}} ==="'
      - '{{.PLF}} catalog query --sql "SELECT * FROM iceberg_metadata(''polaris_catalog.{{.TABLE}}'')" --output {{.OUTPUT}}'
    preconditions:
      - sh: command -v duckdb
        msg: "DuckDB CLI not found. Install from https://duckdb.org/docs/installation/"
      - sh: test -f {{.PROJECT_HOME}}/work/principal.txt
        msg: "Credentials file not found. Run 'plforge catalog:setup' first."

  snapshots:
    desc: Show Iceberg snapshot history for a table
    summary: |
      Shows snapshot history for an Iceberg table via DuckDB. Includes
      sequence number, snapshot ID, timestamp, and manifest list path.

      Useful for verifying data loads, checking write history, or debugging
      sync issues. Can be called from skills instead of raw SQL queries.

      Variables:
        TABLE     Fully qualified table (required, e.g. wildlife.penguins)
        OUTPUT    Output format: text (default), markdown, table

      Example:
        plforge catalog:snapshots TABLE=wildlife.penguins
        plforge catalog:snapshots TABLE=wildlife.penguins OUTPUT=markdown
    vars:
      OUTPUT: '{{.OUTPUT | default "text"}}'
    cmds:
      - '{{.PLF}} catalog query --sql "SELECT * FROM iceberg_snapshots(''polaris_catalog.{{.TABLE}}'') ORDER BY sequence_number DESC" --output {{.OUTPUT}}'
    requires:
      vars: [TABLE]
    preconditions:
      - sh: command -v duckdb
        msg: "DuckDB CLI not found. Install from https://duckdb.org/docs/installation/"
      - sh: test -f {{.PROJECT_HOME}}/work/principal.txt
        msg: "Credentials file not found. Run 'plforge catalog:setup' first."

  cleanup:
    desc: Cleanup Polaris catalog resources
    summary: |
      Removes catalog, principal, roles, and RustFS bucket.
      
      Variables:
        TAGS    Comma-separated Ansible tags (default: all)
      
      Example:
        plforge catalog:cleanup
    cmds:
      - "{{.PLF}} catalog cleanup --yes {{if .TAGS}}--tags={{.TAGS}}{{end}}"

  reset:
    desc: Cleanup and recreate catalog (keeps cluster running)
    summary: |
      Runs catalog:cleanup then catalog:setup. Keeps the cluster running.
      
      Example:
        plforge catalog:reset
    cmds:
      - task: cleanup
      - task: setup
      - 'echo ""'
      - 'echo "Catalog reset complete."'
      - 'echo ""'
      - 'echo "Verification options:"'
      - 'echo "  - Run DuckDB verification: plforge verify"'
      - 'echo "  - Generate notebook: plforge catalog:generate-notebook"'
