version: "3"

silent: true

tasks:
  inventory:
    desc: List tables in local Polaris catalog
    summary: |
      Discovers all tables from the running local Polaris instance.
      
      Options:
        -o json     JSON output format
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:inventory
        plforge l2c:inventory -o json
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: &work_dir_msg |
          ERROR: WORK_DIR is required when running from the source repository.
          
          Usage: plforge l2c:inventory WORK_DIR=~/polaris-dev
    cmds:
      - "{{.PLF}} l2c inventory {{.CLI_ARGS}}"

  status:
    desc: Show L2C migration state (AWS, Snowflake, tables)
    summary: |
      Reads .snow-utils/l2c-state.json and displays:
        - AWS infrastructure (bucket, IAM role, region)
        - Snowflake resources (SA_ROLE, ext vol, catalog int, DB/schema)
        - Per-table sync and register status with color coding
        - Drift detection between AWS and Snowflake naming
      
      Options:
        -o json     Full state as JSON
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:status
        plforge l2c:status -o json
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c status {{.CLI_ARGS}}"

  setup:
    desc: Provision AWS + Snowflake infrastructure (orchestrator)
    summary: |
      Runs setup aws then setup snowflake in sequence.
      Creates S3 bucket, IAM role/policy, external volume, catalog
      integration, SA_ROLE, and target DB/Schema.
      
      Resource names are auto-derived from SNOWFLAKE_USER, project name, and catalog name.
      
      Options:
        --dry-run / -n    Preview without executing
        --yes / -y        Skip confirmation
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:setup --dry-run
        plforge l2c:setup --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c setup {{.CLI_ARGS}}"

  setup:aws:
    desc: Create S3 bucket + IAM role/policy for migration
    summary: |
      Creates AWS infrastructure for L2C migration:
        - S3 bucket (named <user>-<project>-<catalog>)
        - IAM policy with S3 access
        - IAM role with trust policy for Snowflake
      
      Options:
        --dry-run / -n    Preview without executing
        --yes / -y        Skip confirmation
        --prefix TEXT     Override auto-derived user prefix
        --no-prefix       Drop user prefix from names
        --region TEXT     AWS region (default: from profile or us-east-1)
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:setup:aws --dry-run
        plforge l2c:setup:aws --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c setup aws {{.CLI_ARGS}}"

  setup:snowflake:
    desc: Create external volume, catalog integration, SA_ROLE, DB/Schema
    summary: |
      Creates Snowflake infrastructure for L2C migration:
        - External volume pointing to the migration S3 bucket
        - Catalog integration (OBJECT_STORE, ICEBERG)
        - SA_ROLE with least-privilege grants
        - Target database and schema
        - Trust policy update on the AWS IAM role
      
      Requires setup:aws to be complete first (reads state file).
      
      Options:
        --dry-run / -n        Preview SQL without executing
        --yes / -y            Skip confirmation
        --admin-role TEXT     Admin role for elevated ops (default: ACCOUNTADMIN)
        --sf-database TEXT    Override auto-derived database name
        --sf-schema TEXT      Target schema (default: L2C)
        --prefix TEXT         Override user prefix
        --no-prefix           Drop user prefix
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:setup:snowflake --dry-run
        plforge l2c:setup:snowflake --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c setup snowflake {{.CLI_ARGS}}"

  sync:
    desc: Copy Iceberg data from local RustFS to AWS S3
    summary: |
      Smart sync: compares key+size between source and destination,
      transfers only new or changed objects. Rewrites Iceberg metadata
      paths after sync so Snowflake can read the data.
      
      Options:
        --dry-run / -n     Preview transfer plan
        --yes / -y         Skip confirmation
        --force / -f       Re-upload all objects (ignore smart sync)
        --skip-rewrite     Skip metadata path rewriting
        --prefix TEXT      Override user prefix
        --no-prefix        Drop user prefix
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:sync --dry-run
        plforge l2c:sync --yes
        plforge l2c:sync --force --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c sync {{.CLI_ARGS}}"

  register:
    desc: Register synced tables as Snowflake External Iceberg Tables
    summary: |
      Creates Snowflake External Iceberg Tables using catalog integration
      and METADATA_FILE_PATH. Schema is inferred from Iceberg metadata.
      Only processes tables with sync.status=synced. Uses SA_ROLE for DDL.
      
      Options:
        --dry-run / -n        Preview SQL without executing
        --yes / -y            Skip confirmation
        --sf-database TEXT    Override database name
        --sf-schema TEXT      Target schema (default: L2C)
        --prefix TEXT         Override user prefix
        --no-prefix           Drop user prefix
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:register --dry-run
        plforge l2c:register --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c register {{.CLI_ARGS}}"

  migrate:
    desc: Full migration pipeline (setup -> sync -> register)
    summary: |
      Runs the complete L2C pipeline: setup aws -> setup snowflake -> sync -> register.
      Each step is idempotent -- re-running skips completed steps.
      
      Options:
        --dry-run / -n        Preview all steps
        --yes / -y            Skip all confirmations
        --admin-role TEXT     Admin role for setup
        --sf-database TEXT    Override database name
        --prefix TEXT         Override user prefix
        --no-prefix           Drop user prefix
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:migrate --dry-run
        plforge l2c:migrate --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c migrate {{.CLI_ARGS}}"

  refresh:
    desc: Refresh registered Iceberg tables to latest metadata (zero-downtime)
    summary: |
      Compares stored metadata paths with latest on S3. When a newer snapshot
      exists, runs ALTER ICEBERG TABLE ... REFRESH (zero-downtime).
      
      Skips unregistered tables and tables already at latest metadata.
      
      Options:
        --dry-run / -n    Preview what would be refreshed
        --yes / -y        Skip confirmation
        --prefix TEXT     Override user prefix
        --no-prefix       Drop user prefix
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:refresh --dry-run
        plforge l2c:refresh --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c refresh {{.CLI_ARGS}}"

  update:
    desc: Incremental update orchestrator (sync -> refresh -> register)
    summary: |
      Day-2 workflow: sync -> refresh -> register.
      Use --force to re-sync all data (recommended after local mutations).
      
      Options:
        --dry-run / -n    Preview all steps
        --yes / -y        Skip confirmation
        --force / -f      Force sync all data (recommended after local mutations)
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:update --dry-run
        plforge l2c:update --force --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c update {{.CLI_ARGS}}"

  clear:
    desc: Drop SF tables and remove state file, keep files for consistency
    summary: |
      Drops Snowflake Iceberg tables and removes L2C state file.
      Keeps S3/RustFS files and all infrastructure (bucket, IAM, ext vol, SA_ROLE, DB).
      Use l2c:cleanup for full removal.
      
      Options:
        --dry-run / -n    Preview what would be changed
        --yes / -y        Skip confirmation
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:clear --dry-run
        plforge l2c:clear --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c clear {{.CLI_ARGS}}"

  cleanup:
    desc: Full teardown -- remove all L2C infrastructure and data
    summary: |
      Drops Snowflake resources (ext vol, catalog int, SA_ROLE), then deletes
      AWS resources (IAM role/policy). S3 bucket only deleted with --force.
      
      Options:
        --dry-run / -n        Preview teardown plan
        --yes / -y            Skip confirmation
        --force / -f          Also delete S3 bucket (irreversible)
        --admin-role TEXT     Admin role for Snowflake drops
      
      Variables:
        WORK_DIR    Target project directory (or set PLF_WORK_DIR env var)
      
      Example:
        plforge l2c:cleanup --dry-run
        plforge l2c:cleanup --yes
        plforge l2c:cleanup --force --yes
    preconditions:
      - sh: '[ "{{.IS_SOURCE_REPO}}" != "true" ] || [ -n "{{.WORK_DIR}}" ]'
        msg: *work_dir_msg
    cmds:
      - "{{.PLF}} l2c cleanup {{.CLI_ARGS}}"
